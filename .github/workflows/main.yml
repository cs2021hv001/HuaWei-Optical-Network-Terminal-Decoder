name: Build and Release

on: 
  workflow_dispatch:
  push:
    tags:
      - 'v*' # 当你推送以 v 开头的标签（如 v1.0）时触发

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # 必须赋予写入权限才能发布 Release

    steps:
    - name: 1. 下载并解压源码
      run: |
        # 请确保此处的 URL 是正确的
        curl -L -o https://www.sodatool.com/d/bfb73741-e8db-480d-8b3a-0934c0965a63 "你的源码下载链接"
        Expand-Archive -Path source.zip -DestinationPath .
        # 记录文件夹名称，假设解压后是 HuaWei-Optical-Network-Terminal-Decoder-master
        ls

    - name: 2. 安装 Qt 环境
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        arch: 'win64_mingw81'

    - name: 3. 安装 zlib 依赖
      run: vcpkg install zlib:x64-windows

    - name: 4. 执行编译
      shell: bash
      run: |
        # 进入解压后的目录（根据你实际解压出的文件夹名修改）
        cd HuaWei-Optical-Network-Terminal-Decoder-master
        
        # 注入 zlib 路径
        echo "INCLUDEPATH += C:/vcpkg/installed/x64-windows/include" >> hua.pro
        echo "LIBS += -LC:/vcpkg/installed/x64-windows/lib -lz" >> hua.pro
        
        qmake hua.pro
        mingw32-make -j2 release

    - name: 5. 提取并使用 windeployqt 打包
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "dist"
        
        # 寻找生成的 exe（不论它在哪个子目录）
        $exe = Get-ChildItem -Path "." -Filter "*.exe" -Recurse | Select-Object -First 1
        if ($null -eq $exe) { throw "未找到编译产物 exe" }
        
        Write-Host "找到产物: $($exe.FullName)，正在打包..."
        Copy-Item $exe.FullName -Destination "dist\"
        
        # 补全 Qt 运行库
        windeployqt --no-translations --compiler-runtime dist/
        
        # 压缩成 zip 方便下载
        Compress-Archive -Path dist/* -DestinationPath "Huawei-Decoder-Win64.zip"

    - name: 6. 上传到 GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') # 只有推送 tag 时才真正创建 Release
      with:
        files: Huawei-Decoder-Win64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 7. 备选方案：上传到 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Huawei-Decoder-Build
        path: Huawei-Decoder-Win64.zip
