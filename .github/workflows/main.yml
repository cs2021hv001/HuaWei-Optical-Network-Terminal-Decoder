name: Remote Source Build

on: 
  workflow_dispatch: # 允许你手动点击按钮触发编译

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. 下载并解压源码
      run: |
        # 替换下面的 URL 为你的临时存储下载链接
        curl -L -o source.zip "https://www.sodatool.com/d/4dc19a40-9d26-4c85-b528-bcc0bef869c3"
        Expand-Archive -Path source.zip -DestinationPath .
        # 确认解压后的目录结构
        ls

    - name: 2. 安装 Qt 环境
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        arch: 'win64_mingw81'

    - name: 3. 安装 zlib 依赖
      run: |
        vcpkg install zlib:x64-windows

    - name: 4. 执行编译
      shell: bash
      run: |
        cd HuaWei-Optical-Network-Terminal-Decoder-master
        
        # 强制注入依赖路径（确保链接到 vcpkg 的 zlib）
        echo "INCLUDEPATH += C:/vcpkg/installed/x64-windows/include" >> hua.pro
        echo "LIBS += -LC:/vcpkg/installed/x64-windows/lib -lz" >> hua.pro
        
        qmake hua.pro
        # 使用 -j 提高编译速度，并确保编译完成
        mingw32-make -j$(nproc) release

    - name: 5. 提取并打包成果物
      shell: pwsh
      run: |
        # 创建输出文件夹
        New-Item -ItemType Directory -Force -Path "output_dist"
        
        # --- 核心修复：深度搜索生成的 exe ---
        Write-Host "正在搜索编译产物..."
        $exeFiles = Get-ChildItem -Path ".\HuaWei-Optical-Network-Terminal-Decoder-master" -Filter "*.exe" -Recurse
        
        if ($exeFiles.Count -eq 0) {
            Write-Error "找不到编译生成的 .exe 文件！编译可能中途崩溃了。"
            exit 1
        }

        foreach ($file in $exeFiles) {
            Write-Host "找到产物: $($file.FullName)"
            Copy-Item -Path $file.FullName -Destination "output_dist\"
        }

        # 执行 Qt 依赖补全（windeployqt）
        # 注意：windeployqt 需要指向具体的 exe 文件或文件夹
        windeployqt --no-translations --compiler-runtime output_dist/



    - name: 6. 上传结果
      uses: actions/upload-artifact@v4
      with:
        name: Huawei-Decoder-Build
        path: release_bin/
